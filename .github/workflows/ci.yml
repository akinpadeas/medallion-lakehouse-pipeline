name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (Python + SQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linters
        run: pip install ruff sqlfluff

      - name: Lint Python
        run: ruff check .

      - name: Lint SQL (dbt models)
        run: sqlfluff lint dbt_project/models --dialect sparksql

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  dbt-compile:
    name: dbt compile + test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dbt
        run: pip install dbt-spark

      - name: dbt compile (validates all SQL parses correctly)
        working-directory: dbt_project
        run: dbt compile --profiles-dir .

      - name: dbt test (schema + data tests on test dataset)
        working-directory: dbt_project
        run: dbt test --profiles-dir . --target ci
        env:
          DBT_PROFILES_DIR: .
